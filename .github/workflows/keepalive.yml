name: Keep Alive — Ping Render Services

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # also allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: curl -sf https://atomquest-1.onrender.com/health || echo "backend pinged"

      - name: Ping Frontend
        run: curl -sf https://atomquest-frontend-ql5e.onrender.com || echo "frontend pinged"
